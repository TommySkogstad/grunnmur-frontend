version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Oslo
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "deps(npm)"
    groups:
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      testing:
        patterns: ["vitest", "@testing-library/*", "jsdom"]
      eslint:
        patterns: ["eslint", "eslint-*", "@eslint/*", "typescript-eslint", "globals"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Oslo
    commit-message:
      prefix: "deps(actions)"
